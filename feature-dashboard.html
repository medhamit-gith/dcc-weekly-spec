<html lang="en">
<head>

<title>DCC Weekly Activities — Feature Dashboard</title>
<style>
  :root {
    --orange: #FF6B00;
    --orange-light: #FF8C33;
    --green: #34C759;
    --green-bg: #E8F8ED;
    --blue: #007AFF;
    --blue-bg: #E5F0FF;
    --red: #FF3B30;
    --red-bg: #FFECEB;
    --grey: #8E8E93;
    --grey-bg: #F2F2F7;
    --dark: #1C1C1E;
    --card-bg: #FFFFFF;
    --body-bg: #F5F5F7;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--body-bg);
    color: var(--dark);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Hero ────────────────────────────────────────────────── */
  .hero {
    background: linear-gradient(135deg, #1C1C1E 0%, #2C2C2E 50%, #FF6B00 150%);
    color: #fff;
    padding: 48px 24px 36px;
    text-align: center;
  }
  .hero h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .hero .subtitle {
    font-size: 1rem;
    opacity: 0.75;
    margin-bottom: 24px;
  }
  .hero .version-badge {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  /* ── Stats strip ────────────────────────────────────────── */
  .stats-strip {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 1.75rem;
    font-weight: 700;
    display: block;
  }
  .stat-num.live    { color: var(--green); }
  .stat-num.planned { color: var(--blue); }
  .stat-num.disc    { color: var(--red); }
  .stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  /* ── Container ──────────────────────────────────────────── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* ── Search & filters ───────────────────────────────────── */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--body-bg);
    padding: 16px 0 12px;
  }
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--grey);
  }
  .search-input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 2px solid #E5E5EA;
    border-radius: 12px;
    font-size: 1rem;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--orange); }
  .search-input::placeholder { color: #C7C7CC; }

  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #D1D1D6;
    background: #fff;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
  .filter-btn.active {
    background: var(--dark);
    color: #fff;
    border-color: var(--dark);
  }
  .filter-btn .count {
    display: inline-block;
    background: rgba(0,0,0,0.08);
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 4px;
  }
  .filter-btn.active .count { background: rgba(255,255,255,0.2); }

  /* ── Category sections ──────────────────────────────────── */
  .category {
    margin-top: 28px;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
  }
  .category-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .category-title {
    font-size: 1.1rem;
    font-weight: 700;
    flex: 1;
  }
  .category-count {
    font-size: 0.8rem;
    color: var(--grey);
    font-weight: 500;
  }
  .chevron {
    width: 20px;
    height: 20px;
    color: var(--grey);
    transition: transform 0.25s;
  }
  .category.collapsed .chevron { transform: rotate(-90deg); }
  .category.collapsed .feature-list { display: none; }

  /* ── Feature cards ──────────────────────────────────────── */
  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .feature-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }
  .feature-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .feature-card.hidden { display: none; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 6px;
  }
  .feature-name {
    font-weight: 600;
    font-size: 0.95rem;
    flex: 1;
  }
  .status-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .status-badge.live     { background: var(--green-bg); color: #1B8A38; }
  .status-badge.planned  { background: var(--blue-bg);  color: #0055CC; }
  .status-badge.discarded { background: var(--red-bg);  color: #CC1A11; }

  .feature-desc {
    font-size: 0.85rem;
    color: #636366;
    margin-bottom: 8px;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 0.72rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--grey-bg);
    color: #636366;
  }
  .meta-tag.scrum { background: #FFF3E0; color: #E65100; }
  .meta-tag.tab   { background: #E8EAF6; color: #283593; }
  .meta-tag.platform { background: #F3E5F5; color: #6A1B9A; }

  /* ── No results ─────────────────────────────────────────── */
  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--grey);
  }
  .no-results .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .no-results p { font-size: 1rem; }

  /* ── Footer ─────────────────────────────────────────────── */
  .footer {
    text-align: center;
    padding: 32px 16px;
    font-size: 0.8rem;
    color: var(--grey);
  }
  .footer a { color: var(--orange); text-decoration: none; }

  /* ── Responsive ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    .hero h1 { font-size: 1.5rem; }
    .stats-strip { gap: 20px; }
    .stat-num { font-size: 1.4rem; }
    .feature-card { padding: 14px; }
  }
</style>
</head>

        tags: ["AdaptiveDashboardRouter"],
        platform: "iPad"
      },
      {
        name: "Live Resize (Split View / Stage Manager)",
        desc: "Layout adapts dynamically when resizing in Split View or Stage Manager.",
        status: "live",
        tags: ["AdaptiveDashboardRouter"],
        platform: "iPad"
      }
    ]
  },

  // ── Planned Features ────────────────────────────────────
  {
    category: "Planned Features",
    icon: "&#x1F6A7;",
    iconBg: "#BBDEFB",
    features: [
      {
        name: "Multi-Week Trend Charts",
        desc: "Line charts showing distance and ride count trends across 4-8 weeks per rider.",
        status: "planned",
        tags: ["Backlog"],
        tab: "Analysis",
        platform: "iOS / iPad"
      },
      {
        name: "Push Notifications (Weekly Summary)",
        desc: "Monday morning push notification with your previous week's summary and club rank.",
        status: "planned",
        tags: ["Backlog"],
        platform: "iOS / iPad"
      },
      {
        name: "Club Challenges / Goals",
        desc: "Set weekly or monthly distance/elevation goals for the whole club with progress tracking.",
        status: "planned",
        tags: ["Backlog"],
        tab: "Leaderboard",
        platform: "iOS / iPad"
      },
      {
        name: "Apple Watch Companion",
        desc: "Glanceable complications showing your weekly distance and club rank on Apple Watch.",
        status: "planned",
        tags: ["Backlog"],
        platform: "watchOS"
      },
      {
        name: "Dark Mode Toggle",
        desc: "Manual dark/light mode toggle in addition to system-level automatic switching.",
        status: "planned",
        tags: ["Backlog"],
        platform: "iOS / iPad"
      },
      {
        name: "Segment Leaderboards",
        desc: "Compare rider times on popular local Strava segments ridden by club members.",
        status: "planned",
        tags: ["Backlog"],
        tab: "Leaderboard",
        platform: "iOS / iPad"
      },
      {
        name: "Export to PDF / Share Card",
        desc: "Generate a shareable image or PDF of your weekly stats to post on social media.",
        status: "planned",
        tags: ["Backlog"],
        platform: "iOS / iPad"
      }
    ]
  },

  // ── Discarded / Shelved ─────────────────────────────────
  {
    category: "Discarded / Shelved",
    icon: "&#x1F5D1;&#xFE0F;",
    iconBg: "#FFCDD2",
    features: [
      {
        name: "Individual Strava OAuth Login",
        desc: "Each user would authenticate with their own Strava account. Replaced by club code approach — simpler, no individual account needed.",
        status: "discarded",
        tags: ["Legacy"],
        reason: "Club code is simpler and removes the dependency on individual Strava accounts."
      },
      {
        name: "In-App Strava Activity Upload",
        desc: "Allow users to upload rides directly from the app. Strava's own app handles this better.",
        status: "discarded",
        tags: ["Rejected"],
        reason: "Out of scope — Strava's app is purpose-built for recording and uploading rides."
      },
      {
        name: "Chat / Messaging Between Riders",
        desc: "In-app messaging or group chat for club members.",
        status: "discarded",
        tags: ["Rejected"],
        reason: "Club already uses WhatsApp. Duplicating social features adds complexity without value."
      },
      {
        name: "Route Maps / GPS Traces",
        desc: "Display ride routes on a map within the app.",
        status: "discarded",
        tags: ["Rejected"],
        reason: "Strava already provides excellent map views. Duplicating would require significant MapKit work for minimal benefit."
      },
      {
        name: "Calorie / Power Tracking",
        desc: "Track calories burned and power output metrics in the dashboard.",
        status: "discarded",
        tags: ["Rejected"],
        reason: "Data not consistently available across all riders. Some use power meters, most don't — creates misleading comparisons."
      },
      {
        name: "Social Media Integration",
        desc: "Auto-post achievements to Twitter/Instagram/Facebook.",

        tags: ["Rejected"],

// ═══════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════

const container   = document.getElementById("featureContainer");
const searchInput = document.getElementById("search");
const filterBar   = document.getElementById("filterBar");
const noResults   = document.getElementById("noResults");
const statsStrip  = document.getElementById("statsStrip");

let activeFilter = "all";

// Count totals
function countByStatus(status) {
  return FEATURES.reduce((sum, cat) =>
    sum + cat.features.filter(f => status === "all" || f.status === status).length, 0);
}

// Stats strip
statsStrip.innerHTML = `
  <div class="stat-item"><span class="stat-num live">${countByStatus("live")}</span><span class="stat-label">Live</span></div>
  <div class="stat-item"><span class="stat-num planned">${countByStatus("planned")}</span><span class="stat-label">Planned</span></div>
  <div class="stat-item"><span class="stat-num disc">${countByStatus("discarded")}</span><span class="stat-label">Shelved</span></div>
  <div class="stat-item"><span class="stat-num" style="color:#fff">${countByStatus("all")}</span><span class="stat-label">Total</span></div>
`;

// Filter buttons
const filters = [
  { key: "all",       label: "All" },
  { key: "live",      label: "Live" },
  { key: "planned",   label: "Planned" },
  { key: "discarded", label: "Shelved" }
];
filters.forEach(f => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (f.key === "all" ? " active" : "");
  btn.innerHTML = `${f.label}<span class="count">${countByStatus(f.key)}</span>`;
  btn.dataset.filter = f.key;
  btn.addEventListener("click", () => {
    activeFilter = f.key;
    filterBar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  });
  filterBar.appendChild(btn);
});

// Build DOM
FEATURES.forEach((cat, ci) => {
  const section = document.createElement("div");
  section.className = "category";
  section.dataset.index = ci;

  section.innerHTML = `
    <div class="category-header">
      <div class="category-icon" style="background:${cat.iconBg}">${cat.icon}</div>
      <span class="category-title">${cat.category}</span>
      <span class="category-count">${cat.features.length} features</span>
      <svg class="chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="6,4 12,10 6,16"/>
      </svg>
    </div>
    <div class="feature-list">
      ${cat.features.map((f, fi) => `
        <div class="feature-card" data-cat="${ci}" data-idx="${fi}" data-status="${f.status}"
             data-search="${(f.name + ' ' + f.desc + ' ' + (f.tags||[]).join(' ') + ' ' + (f.tab||'') + ' ' + (f.reason||'') + ' ' + (f.platform||'')).toLowerCase()}">
          <div class="card-top">
            <span class="feature-name">${f.name}</span>
            <span class="status-badge ${f.status}">${f.status === 'live' ? '&#x2705; Live' : f.status === 'planned' ? '&#x1F6A7; Planned' : '&#x274C; Shelved'}</span>
          </div>
          <div class="feature-desc">${f.desc}</div>
          ${f.reason ? `<div class="feature-desc" style="color:#FF3B30;font-style:italic;">Why shelved: ${f.reason}</div>` : ''}
          <div class="card-meta">
            ${(f.tags||[]).map(t => `<span class="meta-tag ${t.startsWith('SCRUM') ? 'scrum' : ''}">${t}</span>`).join('')}
            ${f.tab ? `<span class="meta-tag tab">${f.tab}</span>` : ''}
            ${f.platform ? `<span class="meta-tag platform">${f.platform}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;

  // Toggle collapse
  section.querySelector(".category-header").addEventListener("click", () => {
    section.classList.toggle("collapsed");
  });

  container.appendChild(section);
});

// ── Filter + Search ──────────────────────────────────────
function applyFilters() {
  const q = searchInput.value.toLowerCase().trim();
  let visibleCount = 0;

  document.querySelectorAll(".category").forEach(cat => {
    const cards = cat.querySelectorAll(".feature-card");
    let catVisible = 0;

    cards.forEach(card => {
      const matchStatus = activeFilter === "all" || card.dataset.status === activeFilter;
      const matchSearch = !q || card.dataset.search.includes(q);
      const show = matchStatus && matchSearch;
      card.classList.toggle("hidden", !show);
      if (show) { catVisible++; visibleCount++; }
    });

    cat.style.display = catVisible > 0 ? "" : "none";
    cat.querySelector(".category-count").textContent = `${catVisible} feature${catVisible !== 1 ? 's' : ''}`;
  });

  noResults.style.display = visibleCount === 0 ? "" : "none";
}

searchInput.addEventListener("input", applyFilters);

// Animate stat numbers on load
document.querySelectorAll(".stat-num").forEach(el => {
  const target = parseInt(el.textContent);
  let current = 0;
  const step = Math.max(1, Math.ceil(target / 30));
  const interval = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current;
    if (current >= target) clearInterval(interval);
  }, 30);
});
</script>
</body>
